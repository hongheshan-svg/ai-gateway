config ai-gateway 'global'
	option enabled '0'
	option listen_port '443'
	option ca_download_port '8080'
	option ca_dir '/etc/ai-gateway/ca'
	option cert_cache_dir '/tmp/ai-gateway/certs'
	option log_level 'info'
	option audit '1'

config identity 'canonical'
	option device_id 'auto'
	option email 'user@example.com'
	option platform 'darwin'
	option platform_raw 'darwin'
	option arch 'arm64'
	option node_version 'v24.3.0'
	option terminal 'iTerm2.app'
	option package_managers 'npm,pnpm'
	option runtimes 'node'
	option is_claude_ai_auth '1'
	option version '2.1.81'
	option version_base '2.1.81'
	option build_time '2026-03-20T21:26:18Z'
	option deployment_environment 'unknown-darwin'
	option vcs 'git'
	option prompt_platform 'darwin'
	option prompt_shell 'zsh'
	option prompt_os_version 'Darwin 24.4.0'
	option prompt_working_dir '/Users/jack/projects'
	option constrained_memory '34359738368'
	option rss_min '300000000'
	option rss_max '500000000'
	option heap_total_min '40000000'
	option heap_total_max '80000000'
	option heap_used_min '100000000'
	option heap_used_max '200000000'

config provider 'anthropic'
	option enabled '1'
	option upstream 'https://api.anthropic.com'
	list domains 'api.anthropic.com'
	option api_key ''
	option oauth_access_token ''
	option oauth_refresh_token ''

config provider 'openai'
	option enabled '0'
	option upstream 'https://api.openai.com'
	list domains 'api.openai.com'
	option api_key ''

config provider 'gemini'
	option enabled '0'
	option upstream 'https://generativelanguage.googleapis.com'
	list domains 'generativelanguage.googleapis.com'
	option api_key ''
